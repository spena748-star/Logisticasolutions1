<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Logística PRO USA | Carga estilo Tetris + Trailers | FMCSA</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
        }

        body {
            background: #0a0f1e;
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            color: #e2e8f0;
            padding: 24px;
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
        }

        .card {
            background: #1e293b;
            border-radius: 1.5rem;
            padding: 1.5rem;
            margin-bottom: 1.8rem;
            border: 1px solid #334155;
            box-shadow: 0 8px 20px rgba(0,0,0,0.3);
        }

        h2 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .grid-2 {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 24px;
        }

        .flex-row {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            align-items: flex-end;
        }

        label {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #9ca3af;
            display: block;
            margin-bottom: 4px;
        }

        input, select, button {
            padding: 10px 14px;
            border-radius: 60px;
            border: none;
            background: #0f172a;
            color: white;
            font-weight: 500;
            border: 1px solid #334155;
        }

        button {
            background: #10b981;
            color: #0f172a;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        button:hover {
            background: #059669;
            transform: scale(0.98);
        }

        .btn-outline {
            background: transparent;
            border: 1px solid #10b981;
            color: #10b981;
        }

        .btn-outline:hover {
            background: #10b98120;
        }

        .btn-warning {
            background: #f97316;
            color: #0f172a;
        }

        .pallet-item {
            background: #0f172a;
            border-radius: 1rem;
            padding: 12px 16px;
            margin-bottom: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 10px;
        }

        .badge {
            background: #10b981;
            color: #0f172a;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 0.75rem;
            font-weight: bold;
        }

        .trailer-stats {
            background: #0f172a;
            padding: 12px;
            border-radius: 1rem;
            margin-top: 15px;
            font-size: 0.85rem;
        }

        canvas {
            background: #0f172a;
            border-radius: 1rem;
            width: 100%;
            height: auto;
            border: 1px solid #2d3a5e;
            margin-top: 12px;
        }

        .legend {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 15px;
            font-size: 0.7rem;
        }

        .warning {
            color: #f97316;
        }

        .danger {
            color: #ef4444;
            font-weight: bold;
        }

        hr {
            border-color: #334155;
            margin: 16px 0;
        }

        .result-panel {
            font-family: monospace;
            font-size: 0.85rem;
        }

        @media (max-width: 700px) {
            body {
                padding: 12px;
            }
        }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>
<div class="container">
    <div class="card" style="background: #020617; text-align: center;">
        <h1>🚛 LOGÍSTICA PRO · USA</h1>
        <p>Optimización de carga estilo Tetris | FMCSA límites por eje | Múltiples trailers</p>
    </div>

    <div class="grid-2">
        <!-- Panel de gestión de pallets -->
        <div class="card">
            <h2>📦 Pallets / Cargas</h2>
            <div class="flex-row">
                <div style="flex:1"><label>Largo (in)</label><input type="number" id="palletLargo" placeholder="48" value="48" step="1"></div>
                <div style="flex:1"><label>Ancho (in)</label><input type="number" id="palletAncho" placeholder="40" value="40" step="1"></div>
                <div style="flex:1"><label>Alto (in)</label><input type="number" id="palletAlto" placeholder="48" value="48" step="1"></div>
                <div style="flex:1"><label>Peso (lbs)</label><input type="number" id="palletPeso" placeholder="1500" value="1500" step="100"></div>
                <div><button id="addPalletBtn">+ Agregar</button></div>
            </div>
            <hr>
            <div id="palletsList" style="max-height: 280px; overflow-y: auto;"></div>
            <div class="flex-row" style="margin-top: 12px;">
                <button id="clearPalletsBtn" class="btn-outline">Vaciar todo</button>
                <button id="examplePalletsBtn" class="btn-outline">Ejemplo mixto</button>
            </div>
        </div>

        <!-- Configuración del trailer -->
        <div class="card">
            <h2>🚛 Remolque / Trailer</h2>
            <label>Tipo de transporte</label>
            <select id="trailerType">
                <option value="dryvan">Dry Van (53' x 102")</option>
                <option value="reefer">Reefer (53' x 102")</option>
                <option value="flatbed">Flatbed (48' x 102")</option>
                <option value="stepdeck">Step Deck (48' x 102")</option>
                <option value="lowboy">Lowboy (29' x 102")</option>
                <option value="container20">Container 20' (19'4" x 92")</option>
                <option value="container40">Container 40' (39'6" x 92")</option>
            </select>
            <div class="trailer-stats" id="trailerStats"></div>
            <div class="flex-row" style="margin-top: 15px;">
                <div><label>Capacidad extra (lbs)</label><input type="number" id="extraCap" value="0" step="500"></div>
                <div><label>Número de ejes</label><input type="number" id="axlesCount" value="5" min="2" max="9"></div>
            </div>
            <button id="optimizeBtn" style="width:100%; margin-top: 15px; background:#3b82f6;">🧩 OPTIMIZAR (Tetris 2D + Ejes)</button>
        </div>
    </div>

    <!-- Resultados: acomodo visual y análisis legal -->
    <div class="card">
        <h2>📐 Acomodo óptimo (vista superior) + Análisis FMCSA</h2>
        <canvas id="packingCanvas" width="800" height="400" style="width:100%; height:auto; background:#0f172a; border-radius: 1rem;"></canvas>
        <div class="legend" id="legendInfo"></div>
        <div id="packingDetails" class="result-panel" style="margin-top: 16px;"></div>
        <div id="axleAnalysis" style="margin-top: 16px; background:#0f172a; padding: 12px; border-radius: 1rem;"></div>
        <div class="flex-row" style="margin-top: 20px;">
            <button id="pdfReportBtn">📄 Exportar informe PDF</button>
            <button id="resetBtn" class="btn-outline">Limpiar resultados</button>
        </div>
    </div>

    <div class="card">
        <h2>📋 Historial de optimizaciones</h2>
        <div id="historyList"></div>
    </div>
</div>

<script>
    // --------------------------------------------------------------
    // 1. DEFINICIÓN DE TRAILERS (dimensiones internas en pulgadas)
    // --------------------------------------------------------------
    const TRAILERS = {
        dryvan:   { name: "Dry Van 53'",    length: 636, width: 102, maxWeight: 45000, desc: "Estándar carretera" },
        reefer:   { name: "Reefer 53'",     length: 636, width: 102, maxWeight: 44000, desc: "Refrigerado" },
        flatbed:  { name: "Flatbed 48'",    length: 576, width: 102, maxWeight: 48000, desc: "Plataforma abierta" },
        stepdeck: { name: "Step Deck 48'",  length: 576, width: 102, maxWeight: 48000, desc: "Piso bajo" },
        lowboy:   { name: "Lowboy 29'",     length: 348, width: 102, maxWeight: 55000, desc: "Maquinaria pesada" },
        container20: { name: "Container 20'", length: 232, width: 92,  maxWeight: 40000, desc: "ISO 20ft" },
        container40: { name: "Container 40'", length: 474, width: 92,  maxWeight: 44000, desc: "ISO 40ft" }
    };

    let currentTrailerId = "dryvan";
    let pallets = [];   // cada pallet: { length(in), width(in), height(in), weight(lbs) }
    let optimizationResult = null;  // guarda último acomodo
    let history = JSON.parse(localStorage.getItem("usa_history")) || [];

    // Elementos DOM
    const palletsListDiv = document.getElementById("palletsList");
    const trailerStatsDiv = document.getElementById("trailerStats");
    const canvas = document.getElementById("packingCanvas");
    const ctx = canvas.getContext("2d");
    const packingDetails = document.getElementById("packingDetails");
    const axleAnalysisDiv = document.getElementById("axleAnalysis");
    const historyDiv = document.getElementById("historyList");

    // --------------------------------------------------------------
    // Helper: actualizar info del trailer
    function updateTrailerInfo() {
        const t = TRAILERS[currentTrailerId];
        if (!t) return;
        document.getElementById("trailerStats").innerHTML = `
            <strong>${t.name}</strong> | Largo: ${(t.length/12).toFixed(1)}' (${t.length} in) | Ancho: ${t.width} in<br>
            Capacidad máx: ${t.maxWeight.toLocaleString()} lbs | ${t.desc}
        `;
    }

    // Renderizar lista de pallets
    function renderPallets() {
        if (!palletsListDiv) return;
        if (pallets.length === 0) {
            palletsListDiv.innerHTML = "<div style='text-align:center; padding:20px;'>📭 Sin pallets cargados</div>";
            return;
        }
        palletsListDiv.innerHTML = pallets.map((p, idx) => `
            <div class="pallet-item">
                <span><strong>Pallet ${idx+1}</strong> 📏 ${p.length} x ${p.width} x ${p.height} in | ⚖️ ${p.weight.toLocaleString()} lbs</span>
                <button class="delPallet" data-idx="${idx}" style="background:#ef4444; padding:6px 14px;">Eliminar</button>
            </div>
        `).join("");
        document.querySelectorAll(".delPallet").forEach(btn => {
            btn.addEventListener("click", (e) => {
                let idx = parseInt(btn.getAttribute("data-idx"));
                pallets.splice(idx, 1);
                renderPallets();
                clearOptimization();
            });
        });
    }

    function clearOptimization() {
        optimizationResult = null;
        packingDetails.innerHTML = "Optimización pendiente. Presiona 'OPTIMIZAR'.";
        axleAnalysisDiv.innerHTML = "";
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        document.getElementById("legendInfo").innerHTML = "";
    }

    // --------------------------------------------------------------
    // ALGORITMO DE EMPAQUETADO 2D ESTILO TETRIS (Shelf + rotación)
    // Orden: pallets por área descendente. Colocación con mejor ajuste (best fit)
    // Soporta rotación de 90 grados.
    // --------------------------------------------------------------
    function packPallets2D(palletsList, trailerLen, trailerWid) {
        // Clonar y permitir rotación: cada pallet puede usarse en orientación original o rotada (swap largo/ancho)
        let items = palletsList.map(p => ({
            w: p.width,
            d: p.length,   // largo en dirección del trailer
            h: p.height,
            weight: p.weight,
            original: p
        }));
        // Orden descendente por área (para mejor densidad)
        items.sort((a,b) => (b.w*b.d) - (a.w*a.d));
        
        // Estructura de "shelves" (estantes horizontales)
        let shelves = []; // cada shelf: { y, widthRemaining, items: [] }
        let placedItems = []; // para guardar resultado { x, y, w, d, weight, original }
        
        for (let item of items) {
            let bestShelfIdx = -1;
            let bestFitWidth = Infinity;
            let rotated = false;
            let finalW = item.w, finalD = item.d;
            
            // Probar rotación
            for (let rot = 0; rot < 2; rot++) {
                let w = (rot === 0) ? item.w : item.d;
                let d = (rot === 0) ? item.d : item.w;
                if (w > trailerWid || d > trailerLen) continue; // no cabe
                // Buscar shelf existente donde quepa el ancho
                for (let i = 0; i < shelves.length; i++) {
                    let shelf = shelves[i];
                    if (shelf.widthRemaining >= w) {
                        if (shelf.widthRemaining - w < bestFitWidth) {
                            bestFitWidth = shelf.widthRemaining - w;
                            bestShelfIdx = i;
                            finalW = w;
                            finalD = d;
                            rotated = (rot === 1);
                        }
                    }
                }
            }
            
            if (bestShelfIdx !== -1) {
                // Colocar en shelf existente
                let shelf = shelves[bestShelfIdx];
                let x = trailerWid - shelf.widthRemaining;
                let y = shelf.y;
                placedItems.push({ x, y, w: finalW, d: finalD, weight: item.weight, original: item.original, rotated });
                shelf.widthRemaining -= finalW;
                shelf.items.push({ x, y, w: finalW, d: finalD });
                // Reordenar shelves por y (no necesario)
            } else {
                // Crear nueva shelf en la parte superior libre (y = altura acumulada)
                let y = shelves.reduce((maxY, s) => Math.max(maxY, s.y + (s.items.length ? s.items[0].d : 0)), 0);
                // Necesitamos que quepa el largo (depth) en el espacio restante del trailer
                if (y + finalD > trailerLen) {
                    // No cabe verticalmente -> fallback: intentar otra orientación o skip (no se puede colocar)
                    continue; // en producción se podría agregar otro algoritmo, pero para demo skip
                }
                if (finalW > trailerWid) continue;
                let x = 0;
                placedItems.push({ x, y, w: finalW, d: finalD, weight: item.weight, original: item.original, rotated });
                shelves.push({
                    y: y,
                    widthRemaining: trailerWid - finalW,
                    items: [{ x, y, w: finalW, d: finalD }]
                });
            }
        }
        
        // Calcular métricas de peso total y distribución por eje (simple: basado en centro de gravedad)
        let totalWeight = placedItems.reduce((s, p) => s + p.weight, 0);
        // Centro de gravedad longitudinal (eje X del trailer, desde el frente)
        let moment = placedItems.reduce((m, p) => m + p.weight * (p.x + p.w/2), 0);
        let cog = totalWeight > 0 ? moment / totalWeight : 0;
        
        // Límites legales por eje según FMCSA (simulación: 5 ejes típicos, 12000 lbs por eje simple, 34000 tandem)
        // Para demostración, distribuimos carga en ejes según posición longitudinal.
        const axlesCount = parseInt(document.getElementById("axlesCount").value) || 5;
        let axlePositions = [];
        let trailerLengthInches = trailerLen;
        for (let i = 0; i < axlesCount; i++) {
            // posiciones desde el frente del trailer: ejes típicamente atrás
            let pos = trailerLengthInches - (i+1) * (trailerLengthInches / (axlesCount+1));
            axlePositions.push(Math.max(0, Math.min(trailerLengthInches, pos)));
        }
        // Calcular carga por eje usando influencia lineal (1/distancia)
        let axleLoads = new Array(axlesCount).fill(0);
        for (let p of placedItems) {
            let cargoX = p.x + p.w/2;
            for (let a = 0; a < axlesCount; a++) {
                let dist = Math.abs(cargoX - axlePositions[a]);
                let inv = 1 / (dist + 20); // 20in mínimo para evitar infinito
                axleLoads[a] += p.weight * inv;
            }
        }
        // Normalizar para que suma sea totalWeight
        let sumInflu = axleLoads.reduce((s,v)=>s+v,0);
        if (sumInflu > 0) {
            for (let i=0; i<axlesCount; i++) axleLoads[i] = (axleLoads[i] / sumInflu) * totalWeight;
        }
        // Chequear límites FMCSA (simplificado: 20000 lbs por eje simple, 34000 por tandem)
        const maxPerAxle = 20000;
        const maxTandem = 34000;
        let axleWarnings = [];
        for (let i=0; i<axlesCount; i++) {
            let ok = axleLoads[i] <= maxPerAxle;
            if (!ok) axleWarnings.push(`Eje ${i+1}: ${axleLoads[i].toFixed(0)} lbs > ${maxPerAxle} lbs`);
        }
        // Verificar tandem (pares)
        for (let i=0; i<axlesCount-1; i+=2) {
            let tandem = axleLoads[i] + axleLoads[i+1];
            if (tandem > maxTandem) axleWarnings.push(`Tándem ejes ${i+1}-${i+2}: ${tandem.toFixed(0)} lbs > ${maxTandem} lbs`);
        }
        
        return {
            placed: placedItems,
            totalWeight,
            cog,
            axleLoads,
            axleWarnings,
            trailerLen,
            trailerWid,
            success: true
        };
    }
    
    // Dibujar el acomodo en canvas
    function drawPacking(result) {
        if (!result || !result.placed) return;
        const w = canvas.width = 800;
        const h = canvas.height = 400;
        ctx.clearRect(0, 0, w, h);
        let trailerLenPx = w - 60;
        let trailerWidPx = h - 60;
        let scaleX = trailerLenPx / result.trailerLen;
        let scaleY = trailerWidPx / result.trailerWid;
        let offsetX = 30, offsetY = 30;
        // dibujar contorno
        ctx.strokeStyle = "#5b6e8c";
        ctx.lineWidth = 2;
        ctx.strokeRect(offsetX, offsetY, result.trailerLen * scaleX, result.trailerWid * scaleY);
        ctx.fillStyle = "#2d3a5e";
        ctx.fillRect(offsetX, offsetY, result.trailerLen * scaleX, result.trailerWid * scaleY);
        // colores aleatorios pero consistentes por índice
        for (let i = 0; i < result.placed.length; i++) {
            let p = result.placed[i];
            let x = offsetX + p.x * scaleX;
            let y = offsetY + p.y * scaleY;
            let wid = p.w * scaleX;
            let hei = p.d * scaleY;
            ctx.fillStyle = `hsl(${i * 37 % 360}, 70%, 55%)`;
            ctx.fillRect(x, y, wid, hei);
            ctx.strokeStyle = "white";
            ctx.strokeRect(x, y, wid, hei);
            ctx.fillStyle = "white";
            ctx.font = "10px monospace";
            ctx.fillText(`${p.original?.weight || p.weight} lbs`, x+2, y+12);
        }
        // leyenda
        let legendHtml = `<span>✅ Cada rectángulo = pallet (vista superior)</span>`;
        document.getElementById("legendInfo").innerHTML = legendHtml;
    }
    
    // Mostrar detalles de optimización y análisis de ejes
    function displayOptimizationDetails(result) {
        if (!result) return;
        let html = `<strong>📦 Carga total:</strong> ${result.totalWeight.toLocaleString()} lbs<br>`;
        html += `<strong>🎯 Centro de gravedad:</strong> ${result.cog.toFixed(1)} in desde el frente<br>`;
        html += `<strong>📐 Pallets colocados:</strong> ${result.placed.length} de ${pallets.length}<br>`;
        if (result.placed.length < pallets.length) {
            html += `<span class="warning">⚠️ Algunos pallets no
